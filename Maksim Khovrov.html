<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Maksim Khovrov · AI Automation Engineer</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ─────────── tokens ─────────── */
  :root[data-theme="dark"]{
    --bg:#0B0D10;
    --bg-1:#0F1216;
    --surf:#14171C;
    --surf-2:#191D23;
    --line:#1E242C;
    --line-2:#2A323C;
    --ink:#E8EAED;
    --ink-2:#B8BEC6;
    --ink-3:#7A828C;
    --ink-4:#4A525C;
    --accent:#E63426;
    --accent-ink:#FFFFFF;
    --ok:#3FB68B;
    --warn:#E0A23A;
    --bad:#E55C5C;
    --shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 12px 40px rgba(0,0,0,.45);
  }
  :root[data-theme="light"]{
    --bg:#F7F6F3;
    --bg-1:#FFFFFF;
    --surf:#FFFFFF;
    --surf-2:#F1EFEB;
    --line:#E5E2DC;
    --line-2:#D2CEC6;
    --ink:#15171A;
    --ink-2:#3F444B;
    --ink-3:#6B7079;
    --ink-4:#9CA1A9;
    --accent:#D5251A;
    --accent-ink:#FFFFFF;
    --ok:#1F8A5B;
    --warn:#C2761A;
    --bad:#C73B3B;
    --shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 8px 28px rgba(20,20,25,.08);
  }
  :root{
    --sans:"Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --r-sm:6px;
    --r:8px;
    --r-lg:14px;
    --maxw:1200px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:var(--sans);font-size:15px;line-height:1.5;
    font-feature-settings:"cv11","ss01";
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  body{min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--accent);color:var(--accent-ink)}
  /* ─────────── primitives ─────────── */
  .container{max-width:var(--maxw);margin:0 auto;padding:0 32px}
  .mono{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase}
  .hr{border:0;border-top:1px solid var(--line);margin:0}
  .surf{background:var(--surf);border:1px solid var(--line);border-radius:var(--r);}
  .surf-2{background:var(--surf-2);border:1px solid var(--line);border-radius:var(--r);}
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 10px;border:1px solid var(--line-2);border-radius:99px;
    font-family:var(--mono);font-size:11px;color:var(--ink-2);background:var(--surf);
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;flex:none}
  .dot.ok{background:var(--ok)}
  .dot.warn{background:var(--warn)}
  .dot.bad{background:var(--bad)}
  .dot.live{box-shadow:0 0 0 0 var(--accent);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(230,52,38,.6)}70%{box-shadow:0 0 0 8px rgba(230,52,38,0)}100%{box-shadow:0 0 0 0 rgba(230,52,38,0)}}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:9px 14px;border:1px solid var(--line-2);border-radius:var(--r-sm);
    background:var(--surf);color:var(--ink);font-weight:500;font-size:13.5px;
    transition:background .12s ease,border-color .12s ease,transform .04s ease;
    line-height:1;white-space:nowrap;
  }
  .btn:hover{border-color:var(--ink-3);background:var(--surf-2)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08);background:var(--accent)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--ink-2)}
  .btn.ghost:hover{color:var(--ink);background:var(--surf)}
  .btn.sm{padding:6px 10px;font-size:12.5px}
  .btn.lg{padding:12px 18px;font-size:14.5px}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:3px 9px;border:1px solid var(--line-2);border-radius:99px;
    font-family:var(--mono);font-size:11px;color:var(--ink-2);background:transparent;
  }
  .chip.solid{background:var(--surf);}
  .chip.accent{border-color:var(--accent);color:var(--accent);background:transparent}
  .kbd{
    display:inline-block;padding:1px 6px;border:1px solid var(--line-2);border-bottom-width:2px;
    border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--ink-3);background:var(--bg-1)
  }
  /* ─────────── nav ─────────── */
  .nav{
    position:sticky;top:0;z-index:50;
    background:color-mix(in oklab, var(--bg) 86%, transparent);
    backdrop-filter:saturate(180%) blur(14px);
    -webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--line);
  }
  .nav-inner{
    max-width:var(--maxw);margin:0 auto;padding:14px 32px;
    display:flex;align-items:center;gap:18px;
  }
  .nav .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14.5px}
  .nav .brand .mark{
    width:28px;height:28px;border-radius:7px;background:var(--surf);border:1px solid var(--line-2);
    display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:600;
    overflow:hidden;
  }
  .nav-links{display:flex;gap:4px;margin-left:18px}
  .nav-links a{
    padding:6px 10px;border-radius:6px;font-size:13px;color:var(--ink-2);
    font-family:var(--mono);font-size:12px;letter-spacing:.02em;
  }
  .nav-links a:hover{background:var(--surf);color:var(--ink)}
  .nav-cta{margin-left:auto;display:flex;align-items:center;gap:8px}
  .nav-cta .status{
    display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--ink-3);
  }
  /* mobile nav: collapse links */
  @media (max-width:880px){
    .nav-links{display:none}
    .nav-inner{padding:12px 18px}
    .container{padding:0 18px}
    .nav-cta .status{display:none}
  }
  /* ─────────── section scaffolding ─────────── */
  section{scroll-margin-top:80px}
  .sec-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .sec-hd .num{font-family:var(--mono);font-size:11px;color:var(--ink-4);letter-spacing:.14em}
  .sec-hd .name{font-family:var(--mono);font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.14em}
  .sec-hd .rule{flex:1;border-top:1px dashed var(--line-2)}
  /* utilities */
  .row{display:flex;gap:12px}
  .row.center{align-items:center}
  .col{display:flex;flex-direction:column;gap:12px}
  .grow{flex:1}
  .grid{display:grid;gap:12px}
  /* keep CV pill out of the way on small screens */
  .floating-cv{
    position:fixed;right:20px;bottom:20px;z-index:30;
    box-shadow:var(--shadow);
  }
  @media (max-width:680px){
    .floating-cv{right:14px;bottom:14px}
  }
</style>

</head>

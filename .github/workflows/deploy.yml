name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: khovrov-dev-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://portfolio:portfolio@localhost:5432/portfolio
          SESSION_SECRET: ci-session-secret-ci-session-secret
          IP_HASH_SECRET: ci-ip-hash-secret-ci-ip-hash-secret

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          for attempt in 1 2 3; do
            if ssh-keyscan -T 10 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "ssh-keyscan failed after 3 attempts" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Upload release
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='docker-data' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.production' \
            --exclude='.env.production.*' \
            --exclude='.env.*.local' \
            -czf - . | ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -e
             mkdir -p '${{ secrets.VPS_DEPLOY_PATH }}'
             find '${{ secrets.VPS_DEPLOY_PATH }}' -mindepth 1 -maxdepth 1 \
               ! -name '.env.production' \
               ! -name '.env.production.*' \
               ! -name 'docker-data' \
               -exec rm -rf {} +
             tar -xzf - -C '${{ secrets.VPS_DEPLOY_PATH }}'"

      - name: Deploy on VPS
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'cat > /tmp/khovrov-deploy.sh && bash /tmp/khovrov-deploy.sh; status=$?; rm -f /tmp/khovrov-deploy.sh; exit $status' <<'EOF'
          set -euo pipefail
          set -x
          cd "${{ secrets.VPS_DEPLOY_PATH }}"
          test -f .env.production
          docker compose --env-file .env.production up -d --build postgres
          docker compose --env-file .env.production run --rm --no-deps caddy caddy validate --config /etc/caddy/Caddyfile
          docker compose --env-file .env.production build --no-cache app
          docker compose --env-file .env.production run --rm app npm run db:migrate
          docker compose --env-file .env.production run --rm app npm run db:init-admin
          docker compose --env-file .env.production up -d --force-recreate --no-deps app
          docker compose --env-file .env.production up -d --force-recreate --no-deps caddy
          docker compose --env-file .env.production up -d --no-deps umami
          docker compose --env-file .env.production ps
          docker image prune -f
          EOF

      - name: Smoke test production
        run: |
          SITE_URL="https://khovrov.dev"
          CHAT_URL="https://chat.khovrov.dev"
          for attempt in 1 2 3 4 5; do
            if curl -fsS "$SITE_URL/" >/dev/null; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "Homepage smoke test failed" >&2
              exit 1
            fi
            sleep 5
          done

          CHAT_STATUS="$(curl -sk -o /dev/null -w '%{http_code}' "$CHAT_URL/")"
          if [ "$CHAT_STATUS" != "401" ]; then
            echo "Chat smoke test expected 401, got $CHAT_STATUS" >&2
            exit 1
          fi

          curl -fsS \
            -H 'Content-Type: application/json' \
            -d '{"type":"deploy_smoke","metadata":{"source":"github-actions"}}' \
            "$SITE_URL/api/site-actions" >/dev/null
